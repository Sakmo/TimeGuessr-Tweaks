<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>TimeGuessr Tweaks</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 220px;
        padding: 12px;
      }

      label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        cursor: pointer;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <label>
      <input type="checkbox" id="removeAdsToggle" />
      Remove ads
    </label>

    <label>
      <input type="checkbox" id="blinkingTimerToggle" />
      Blinking timer
    </label>

    <label>
      <input type="checkbox" id="zoomResultsImageToggle" />
      Zoom results image
    </label>

    <label>
      <input type="checkbox" id="autoSubmitAtOneToggle" />
      Auto-submit at 0:01
    </label>

    <label>
      <input type="checkbox" id="yearMarkersToggle" />
      Year markers
    </label>

    <script src="popup.js"></script>
  </body>
</html>
